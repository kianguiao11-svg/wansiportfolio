<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flexbox Task</title>

<style>
/* GENERAL */
body {
    font-family: Arial;
    margin: 20px;
}

/* --- PART 1 --- */

/* 12a */
.flex-2 {
    display: flex;
    margin-bottom: 20px;
}
.flex-2 div {
    border: 1px solid black;
}
.flex-2 .item1{
    width: 200px;
}
.flex-2 .item2 {
    width: 75px;
}

/* 12b */
.flex-3 {
    display: flex;
    margin-bottom: 20px;
}
.flex-3 div {
    border: 1px solid black;
}
.flex-3 .item1 {
    width: 50px;
}
.flex-3 .item2 {
    flex: 1;
}
.flex-3 .item3 {
    width: 75px;
}

/* 12c */
.flex-4 {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}
.flex-4 div {
    border: 1px solid black;
}

/* 12d */
.flex-border {
    display: flex;
    height: 50px;
    border: 2px solid gray;
    justify-content: space-between;
    align-items: center;
    padding: 5px;
}

/* ---------- PART 2 (RESPONSIVE) ---------- */

.container {
    display: flex;
    flex-wrap: wrap;
    border: 3px solid yellow;
}

.header, .footer {
    width: 100%;
    padding: 10px;
    background: #eee;
}

.left, .right {
    padding: 40px;
    background: green;
    color: white;
    border: 2px solid yellow;
}

/* ≥ 800px */
@media (min-width: 800px) {
    .left {
        width: 50%;
    }
    .right {
        width: 50%;
    }
}

/* ≤ 400px */
@media (max-width: 400px) {
    .left, .right {
        width: 100%;
    }

    /* swap order */
    .right {
        order: 1;
    }
    .left {
        order: 2;
    }
}
</style>

</head>
<body>

<h2>Part 1</h2>

<!-- 12a -->
<div class="flex-2">
    <div class="item1">item1</div>
    <div class="item2">item2</div>
</div>

<!-- 12b -->
<div class="flex-3">
    <div class="item1">item1</div>
    <div class="item2">item2</div>
    <div class="item3">item3</div>
</div>

<!-- 12c -->
<div class="flex-4">
    <div>item1</div>
    <div>item2</div>
    <div>item3</div>
    <div>item4</div>
</div>

<!-- 12d -->
<div class="flex-border">
    <div>item1</div>
    <div>item2</div>
</div>

<h2>Part 2</h2>

<div class="container">
    <div class="header">This is a header</div>

    <div class="left">Section Left side</div>
    <div class="right">Section Right side</div>

    <div class="footer">This is a footer</div>
</div>

</body>
</html>
