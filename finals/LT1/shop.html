<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Cards</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      display: flex;
      gap: 40px;
    }

    .card {
      width: 200px;
      background: #fff;
      padding: 10px;
      text-align: center;
      position: relative;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .badge {
      position: absolute;
      top: 10px;
      right: 10px;
      background: black;
      color: white;
      font-size: 12px;
      padding: 4px 6px;
    }

    .card img {
      width: 100%;
      height: auto;
    }

    .btn {
      margin-top: 10px;
      padding: 8px 12px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      background: #333;
    }
  </style>
</head>
<body>

<div class="container">
  
  <!-- Card 1 -->
  <div class="card">
    <div class="badge">20% OFF</div>
    <img src="/images/661481564_1946437745989528_8166909152545691097_n.jpg" alt="Shirt">
  </div>

  <!-- Card 2 -->
  <div class="card">
    <div class="badge">20% OFF</div>
    <img src="/images/661481564_1946437745989528_8166909152545691097_n.jpg" alt="Shirt">
    <button class="btn">Add to Cart</button>
  </div>

</div>

</body>
</html>
