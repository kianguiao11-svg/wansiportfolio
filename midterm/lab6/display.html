<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form Design</title>

<style>
body {
    background: #f0f0f0;
    font-family: Arial, sans-serif;
}

/* CENTER BOX */
.container {
    width: 350px;
    margin: 50px auto;
    background: #fff;
    padding: 20px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

/* INPUT */
input {
    width: 100%;
    padding: 10px;
    margin: 5px 0 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* BUTTON */
button {
    padding: 8px 15px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

/* GOOGLE STYLE */
.google {
    text-align: center;
    font-size: 30px;
    margin: 20px 0;
}

.google span:nth-child(1){color:#4285F4;}
.google span:nth-child(2){color:#DB4437;}
.google span:nth-child(3){color:#F4B400;}
.google span:nth-child(4){color:#4285F4;}
.google span:nth-child(5){color:#0F9D58;}
.google span:nth-child(6){color:#DB4437;}

/* SEARCH BAR */
.search {
    width: 100%;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
}

/* SIGNUP BUTTON */
.signup-btn {
    width: 100%;
    background: #4a6cf7;
    color: white;
    padding: 10px;
    margin-top: 10px;
}

/* RIDE BUTTONS */
.black-btn {
    background: black;
    color: white;
}

.gray-btn {
    background: #ccc;
}
</style>
</head>

<body>

<div class="container">

    <!-- TOP INPUT -->
    <input type="text" placeholder="Name">
    <input type="text" placeholder="Email">

    <p style="text-align:center; font-size:13px;">
        Thanks for chatting with our customer support. 
        Would you like to take our quick survey?
        <button>Yes</button>
        <button>No</button>
    </p>

    <!-- GOOGLE -->
    <div class="google">
        <span>G</span><span>o</span><span>o</span>
        <span>g</span><span>l</span><span>e</span>
    </div>

    <!-- SEARCH -->
    <input type="text" class="search" placeholder="Search Google or type a URL">

    <!-- SIGN UP -->
    <h4>Sign Up</h4>
    <input type="text" placeholder="First name">
    <input type="text" placeholder="Last name">
    <input type="email" placeholder="Email">
    <button class="signup-btn">Sign Up</button>

    <!-- RIDE -->
    <h4>Request a ride now</h4>
    <input type="text" placeholder="Enter pickup location">
    <input type="text" placeholder="Enter destination">

    <button class="black-btn">Request now</button>
    <button class="gray-btn">Schedule for later</button>

</div>

</body>
</html>
